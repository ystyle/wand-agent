name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -buildvcs=false -ldflags="-s -w" -o "wand-agent-${{ matrix.goos }}-${{ matrix.goarch }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wand-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wand-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wand-agent-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wand-agent-*
          generate_release_notes: true
